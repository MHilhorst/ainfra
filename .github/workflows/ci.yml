name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

      # Dogfood: ainfra's own validation gate must pass on the manifests this
      # repo ships. The showcase manifest and the multi-database example are
      # both resolved end to end via `lock` (which validates and pins).
      - name: lock the example manifests
        run: |
          go build -o ainfra ./cmd/ainfra
          ./ainfra lock
          ./ainfra --chdir examples/multi-database lock
