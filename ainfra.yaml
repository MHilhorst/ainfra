version: 1

# ---------------------------------------------------------------------------
# A showcase ainfra.yaml — what a normal team's Claude Code setup looks like
# as config-as-code. The harder, fully-templated case lives in
# examples/multi-database/; this one is the friendly, read-in-30-seconds form.
#
# It is a sample: ainfra does not itself depend on these servers. Try it:
#   ainfra validate     # static-checks every channel below
#   ainfra lock         # resolves the manifest and writes ainfra.lock
#
# What resolves today: hooks and commands, plus templated MCP servers. Inline
# MCP servers and cliTools are validated now and fully resolved once the
# channel provider layer lands (see docs/reference/design.md, "Status" in README).
# ---------------------------------------------------------------------------

# --- Installable substrate: binaries the channels below rest on --------------
cliTools:
  ripgrep:
    versionConstraint: ">=14.0"
    install:
      brew: { formula: ripgrep }
      apt:  { package: ripgrep }
    check:
      command: "rg --version"
      versionRegex: 'ripgrep (\d+\.\d+\.\d+)'

# --- Secrets: references only — ainfra never stores a credential value -------
secrets:
  github-token:
    mode: direct
    scope: personal                       # each developer supplies their own
    ref: "op://Private/github/personal-access-token"

# --- Templates: define one MCP server shape, instantiate it many times -------
# `${params.*}` substitutes into args, command, url, env, and headers. This is
# the trick that compresses a long runbook into a few lines per server.
templates:
  fs-scoped:
    description: A filesystem MCP server pinned to one directory.
    params:
      root: { type: string, required: true }
    produces:
      mcpServer:
        transport: stdio
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "${params.root}"]
        version: "0.6.2"

# --- MCP servers: what lands in each developer's .mcp.json -------------------
mcpServers:
  # Two instances of the template — same shape, different root directory.
  repo:
    template: fs-scoped
    params: { root: "." }
  docs:
    template: fs-scoped
    params: { root: "./docs" }

  # The GitHub server — its token comes from the reference declared above.
  github:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    version: "0.6.2"
    secret:
      token: github-token                  # references the github-token secret

# --- Hooks: automation bound to Claude Code lifecycle events -----------------
hooks:
  gofmt-after-edit:
    event: PostToolUse
    matcher: "Edit|Write"
    command: "gofmt -w ."
    timeout: 5000

# --- Skills: PREVIEW ---------------------------------------------------------
# A skill is a folder (SKILL.md + files). Skills committed to a repo's own
# .claude/skills/ already arrive with `git clone` — ainfra does NOT manage
# those. ainfra's job is the layer git can't reach: skills sourced from
# elsewhere, materialized — pinned and content-hashed — into .claude/skills/
# or ~/.claude/skills/. The resolver does not process this block yet; it shows
# the intended shape (see docs/reference/design.md §1).
skills:
  # Ships in this repo — teaches any AI agent how to use ainfra in projects
  # that adopt it. Source it from your own ainfra.yaml the same way.
  using-ainfra:
    source: "github:MHilhorst/ainfra/skills/using-ainfra"
    version: "0.1.0"
  pdf-processing:
    source: "github:anthropics/skills/document-skills/pdf"
    version: "1.4.0"
  incident-response:                       # from the team's own central skills repo
    source: "github:acme/claude-skills/incident-response"
    version: "2.3.0"
